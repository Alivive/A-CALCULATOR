<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width, initial-scale=1.0">
    <link  rel="stylesheet" href="assets/style.css">
    <link  rel="icon" href="assets/favicon.ico">
    <title>ARITHMETICS AID</title>
</head>
<body>
    <div class="calculate">
        <input type="text" placeholder="0" id="inputbox">
           <div>
            <button>AC</button>
            <button>DEL</button>
            <button class="operators">%</button>
            <button class="operators">/</button>
           </div>
           <div>
            <button>7</button>
            <button>8</button>
            <button>9</button>
            <button class="operators">*</button>
           </div>
           <div>
            <button>4</button>
            <button>5</button>
            <button>6</button>
            <button class="operators">-</button>
           </div>
           <div>
            <button>1</button>
            <button>2</button>
            <button>3</button>
            <button class="operators ">+</button>
           </div>
           <div>
            <button>00</button>
            <button>0</button>
            <button>.</button>
            <button class="equals">=</button>
           </div>
    </div>

    <script src="assets/script.js"></script>
</body>
</html>
